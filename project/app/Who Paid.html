  html, body { margin: 0; height: 100%; }
  body {
    background: radial-gradient(120% 90% at 50% 0%, #FCEFE0 0%, #F3E7DA 60%, #EADCCB 100%);
    display: flex; align-items: center; justify-content: center; min-height: 100vh;

  #stage { transform-origin: center; }
</style>

<body>
<div id="stage"><div id="root"></div></div>

<script type="text/babel" src="ios-frame.jsx"></script>

<script type="text/babel">
const Frame = ({ children }) => <window.IOSDevice>{children}</window.IOSDevice>;

function fit() {
  const stage = document.getElementById('stage');
  const s = Math.min(1, (window.innerHeight - 48) / 874, (window.innerWidth - 48) / 402);
  stage.style.transform = `scale(${s})`;
}
window.addEventListener('resize', fit);

function boot() {
  if (!window.IOSDevice || !window.WPApp || !window.WhoPaidDesignSystem_ce3383 || !window.lucide) { setTimeout(boot, 40); return; }
  ReactDOM.createRoot(document.getElementById('root')).render(<window.WPApp Frame={Frame} padTop="54px" padBottom="18px" />);
  fit();
}
boot();
</script>
